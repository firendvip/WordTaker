<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WordTaker 黑猫动作 20</title>
<style>
body{margin:0;background:#f6f6f7;color:#1f2937;font-family:-apple-system,"PingFang SC",Helvetica,Arial,sans-serif}
.wrap{max-width:940px;margin:0 auto;padding:26px 20px 64px}
h1{font-size:22px;font-weight:600;margin:0 0 4px}
.sub{font-size:13px;color:#6b7280;margin:0 0 18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:18px 12px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.card{width:100%;height:96px;background:#fff;border:.5px solid #e5e7eb;border-radius:14px;position:relative;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;padding-bottom:8px;box-sizing:border-box}
.lab{font-size:12px;color:#374151}
.catwrap{transform-box:fill-box;transform-origin:center bottom;display:block}
.tail{transform-box:fill-box;transform-origin:80% 92%}
.ears{transform-box:fill-box;transform-origin:center bottom}
.head{transform-box:fill-box;transform-origin:50% 95%}
.headS{transform-box:fill-box;transform-origin:90% 90%}
.eyes{transform-box:fill-box;transform-origin:center}
.body{transform-box:fill-box;transform-origin:center bottom}
.paw{transform-box:fill-box;transform-origin:center top}
.mouth{transform-box:fill-box;transform-origin:center;opacity:0}
.zz,.note,.heart{position:absolute;font-size:11px;pointer-events:none}
.zz{top:10px;left:60%;color:#94a3b8;font-size:10px;animation:zf 2.4s ease-in-out infinite}
.note{top:14px;left:58%;animation:np 1.4s ease-out infinite}
.heart{top:14px;left:56%;color:#fb7185;animation:hb 1.5s ease-out infinite}
.act-blink .eyes{animation:blink 3s ease-in-out infinite}
.act-wag .tail{animation:wag .5s ease-in-out infinite}
.act-twitch .ears{animation:twitch 2.4s ease-in-out infinite}
.act-tilt .head{animation:tilt 2.4s ease-in-out infinite}
.act-hop .catwrap{animation:hop .6s ease-in-out infinite}
.act-look .head{animation:look 2.8s ease-in-out infinite}
.act-breath .body{animation:breath 2.6s ease-in-out infinite}
.act-meow .head{animation:meowHead 1.8s ease-in-out infinite}
.act-meow .mouth{animation:meowMouth 1.8s ease-in-out infinite}
.act-yawn .mouth{animation:yawnMouth 3.6s ease-in-out infinite}
.act-yawn .eyes{animation:blink 3.6s ease-in-out infinite}
.act-wave .paw{animation:wave .7s ease-in-out infinite}
.act-wash .paw{animation:wash 1.1s ease-in-out infinite}
.act-shake .catwrap{animation:shake 2.4s ease-in-out infinite}
.act-squint .eyes{transform:scaleY(.45)}
.act-turn .catwrap{animation:turn 3.4s ease-in-out infinite}
.act-stretch .body{animation:stretch 3s ease-in-out infinite}
.act-curl .catwrap{transform:scale(.9)}
.act-curl .body{animation:breath 3s ease-in-out infinite}
.act-lift .headS{animation:lift 3.6s ease-in-out infinite}
@keyframes blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
@keyframes wag{0%,100%{transform:rotate(0)}50%{transform:rotate(-16deg)}}
@keyframes twitch{0%,82%,100%{transform:rotate(0)}88%{transform:rotate(-9deg)}94%{transform:rotate(6deg)}}
@keyframes tilt{0%,100%{transform:rotate(0)}50%{transform:rotate(9deg)}}
@keyframes hop{0%,100%{transform:translateY(0)}45%{transform:translateY(-7px)}}
@keyframes look{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
@keyframes breath{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.06)}}
@keyframes meowHead{0%,100%{transform:translateY(0) rotate(0)}40%{transform:translateY(-1.5px) rotate(-4deg)}}
@keyframes meowMouth{0%,100%{opacity:0;transform:scaleY(.2)}35%,65%{opacity:1;transform:scaleY(1)}}
@keyframes yawnMouth{0%,70%,100%{opacity:0;transform:scaleY(.2)}80%,92%{opacity:1;transform:scaleY(1.7)}}
@keyframes wave{0%,100%{transform:rotate(0)}50%{transform:rotate(-32deg)}}
@keyframes wash{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-9px) rotate(-10deg)}}
@keyframes shake{0%,70%,100%{transform:rotate(0)}74%{transform:rotate(-5deg)}78%{transform:rotate(5deg)}82%{transform:rotate(-4deg)}86%{transform:rotate(3deg)}90%{transform:rotate(0)}}
@keyframes turn{0%,100%{transform:scaleX(1)}24%{transform:scaleX(.15)}50%{transform:scaleX(-1)}76%{transform:scaleX(.15)}}
@keyframes stretch{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.22) translateY(2px)}}
@keyframes lift{0%,62%,100%{transform:rotate(0)}78%{transform:rotate(-14deg)}}
@keyframes zf{0%{transform:translate(0,0);opacity:0}25%{opacity:1}100%{transform:translate(7px,-14px);opacity:0}}
@keyframes np{0%{transform:translateY(2px) scale(.6);opacity:0}30%{opacity:1}100%{transform:translateY(-13px) scale(1);opacity:0}}
@keyframes hb{0%{transform:translateY(4px) scale(.5);opacity:0}30%{opacity:1}100%{transform:translateY(-12px) scale(1);opacity:0}}
</style></head>
<body><div class="wrap"><h1>WordTaker · 小黑猫动作 20（原创）</h1><div class="sub">静音→趴睡；说话→活泼动作；处理→另一动作。挑你喜欢的编号。</div><div class="grid" id="g"></div></div>
<script>
(function(){
var K='#1c1c1e';
function sit(){return '<svg class="catwrap" width="58" height="63" viewBox="0 0 44 48" xmlns="http://www.w3.org/2000/svg">'
 +'<path class="tail" d="M30 38 C 41 36, 42 21, 34 18" fill="none" stroke="'+K+'" stroke-width="5" stroke-linecap="round"/>'
 +'<ellipse class="body" cx="22" cy="35" rx="11.5" ry="12" fill="'+K+'"/>'
 +'<ellipse cx="27.5" cy="45" rx="3" ry="2.3" fill="'+K+'"/><g class="paw"><ellipse cx="16.5" cy="45" rx="3" ry="2.3" fill="'+K+'"/></g>'
 +'<g class="head"><g class="ears"><path d="M11 12 L13 2 L20 9 Z" fill="'+K+'"/><path d="M33 12 L31 2 L24 9 Z" fill="'+K+'"/></g>'
 +'<circle cx="22" cy="16" r="12" fill="'+K+'"/>'
 +'<g class="eyes"><ellipse cx="17.4" cy="16" rx="3" ry="3.7" fill="#FDE047"/><ellipse cx="26.6" cy="16" rx="3" ry="3.7" fill="#FDE047"/><ellipse cx="17.4" cy="16.4" rx="1.1" ry="2.5" fill="'+K+'"/><ellipse cx="26.6" cy="16.4" rx="1.1" ry="2.5" fill="'+K+'"/><circle cx="18.4" cy="14.4" r=".8" fill="#fff"/><circle cx="27.6" cy="14.4" r=".8" fill="#fff"/></g>'
 +'<path d="M21 20 h2 l-1 1.2 z" fill="#F472B6"/><path class="smile" d="M20 22 q2 1.5 4 0" fill="none" stroke="#666" stroke-width=".8" stroke-linecap="round"/><ellipse class="mouth" cx="22" cy="22.6" rx="1.7" ry="2" fill="#3a2630"/></g></svg>';}
function sleep(){return '<svg class="catwrap" width="66" height="38" viewBox="0 0 46 26" xmlns="http://www.w3.org/2000/svg">'
 +'<path class="tail" d="M39 16 C 44 14, 44 21, 38 19.5" fill="none" stroke="'+K+'" stroke-width="4" stroke-linecap="round"/>'
 +'<ellipse class="body" cx="24" cy="17" rx="16" ry="8" fill="'+K+'"/>'
 +'<g class="headS"><path d="M5 9 L7 2 L12 8 Z" fill="'+K+'"/><path d="M16 9 L14 2 L9 7 Z" fill="'+K+'"/><circle cx="11" cy="16" r="8" fill="'+K+'"/>'
 +'<path d="M6.5 15.5 q1.6 1.4 3.2 0" fill="none" stroke="#FDE047" stroke-width="1.2" stroke-linecap="round"/><path d="M12.2 15.5 q1.4 1.2 2.8 0" fill="none" stroke="#FDE047" stroke-width="1.2" stroke-linecap="round"/></g></svg>';}
var C=[
['趴睡','sleep','act-breath','zzz'],['蜷成球','sleep','act-curl',''],['坐·眨眼','sit','act-blink',''],['摇尾巴','sit','act-wag',''],['耳朵抖','sit','act-twitch',''],
['歪头','sit','act-tilt',''],['小跳','sit','act-hop',''],['左右看','sit','act-look',''],['呼吸','sit','act-breath',''],['喵叫','sit','act-meow',''],
['打哈欠','sit','act-yawn',''],['挥爪','sit','act-wave',''],['洗脸','sit','act-wash',''],['抖一抖','sit','act-shake',''],['眯眼笑','sit','act-squint',''],
['转身','sit','act-turn',''],['伸懒腰','sit','act-stretch',''],['带音符','sit','act-wag','notes'],['开心心心','sit','act-hop','hearts'],['抬头(趴)','sleep','act-lift','']
];
var g=document.getElementById('g');
C.forEach(function(c,i){
 var cell=document.createElement('div');cell.className='cell';
 var card=document.createElement('div');card.className='card '+c[2];
 card.innerHTML=(c[1]==='sit'?sit():sleep());
 if(c[3]==='zzz'){card.innerHTML+='<span class="zz">z</span><span class="zz" style="left:66%;top:7px;animation-delay:.9s">z</span>';}
 if(c[3]==='notes'){card.innerHTML+='<span class="note" style="color:#7DB4FF">♪</span><span class="note" style="left:64%;color:#F7A8CB;animation-delay:.7s">♫</span>';}
 if(c[3]==='hearts'){card.innerHTML+='<span class="heart">♥</span><span class="heart" style="left:62%;animation-delay:.7s">♥</span>';}
 var lab=document.createElement('div');lab.className='lab';lab.textContent=(i+1)+'. '+c[0];
 cell.appendChild(card);cell.appendChild(lab);g.appendChild(cell);
});
})();
</script>
</body></html>
