<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WordTaker 胶囊皮肤 50</title>
<style>
body{margin:0;background:#f6f6f7;color:#1f2937;font-family:-apple-system,"PingFang SC",Helvetica,Arial,sans-serif}
.wrap{max-width:920px;margin:0 auto;padding:28px 20px 64px}
h1{font-size:22px;font-weight:600;margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:20px 14px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.lab{font-size:11px;color:#374151;text-align:center}
.pill{width:162px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.dotb{position:absolute;left:11px;width:8px;height:8px;border-radius:50%}
.fx{display:flex;align-items:center;gap:4px;height:20px}
.bar{width:3px;height:12px;border-radius:2px;transform-origin:center}
.barT{width:2px;height:13px;border-radius:1px;transform-origin:center}
.note{font-size:12px;line-height:1}
.cd{width:5px;height:5px;border-radius:50%}
@keyframes eq{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1.55)}}
@keyframes bob{0%,100%{transform:translateY(2px)}50%{transform:translateY(-4px)}}
@keyframes breathe{0%,100%{opacity:.25}50%{opacity:1}}
</style></head>
<body><div class="wrap"><h1>WordTaker · 胶囊皮肤 50 种</h1><div class="grid" id="g"></div></div>
<script>
(function(){
var PAL=['#7DB4FF','#5FD8C4','#F7A8CB','#FFD36B','#B9A6FF','#9FE89A'];
function mk(t,c,s,x){var e=document.createElement(t);if(c)e.className=c;if(s)e.setAttribute('style',s);if(x!=null)e.textContent=x;return e;}
function center(t,c){var fx=mk('div','fx');function col(i){return c==='multi'?PAL[i%PAL.length]:c;}
 if(t==='eq'){for(var i=0;i<5;i++)fx.appendChild(mk('span','bar','background:'+col(i)+';animation:eq 1s ease-in-out '+(i*0.12).toFixed(2)+'s infinite'));}
 else if(t==='bob'){var g=['♪','♫','♬','♩','♫'];for(var i=0;i<5;i++)fx.appendChild(mk('span','note','color:'+col(i)+';animation:bob 1.2s ease-in-out '+(i*0.12).toFixed(2)+'s infinite',g[i]));}
 else if(t==='dot'){for(var i=0;i<5;i++)fx.appendChild(mk('span','cd','background:'+col(i)+';animation:breathe 1.5s ease-in-out '+(i*0.16).toFixed(2)+'s infinite'));}
 else if(t==='wave'){for(var i=0;i<7;i++)fx.appendChild(mk('span','barT','background:'+col(i)+';animation:eq 1.1s ease-in-out '+(i*0.07).toFixed(2)+'s infinite'));}
 return fx;}
var S=[
['暗·白','#0b0b0c','#ffffff','eq',1],['暗·青','#0b0b0c','#5FD8C4','eq',1],['暗·蓝','#0b0b0c','#7DB4FF','bob',1],['暗·粉','#0b0b0c','#F7A8CB','dot',1],['暗·琥珀','#0b0b0c','#FFD36B','eq',1],
['暗·紫','#0b0b0c','#B9A6FF','bob',1],['暗·绿','#0b0b0c','#9FE89A','wave',1],['暗·彩','#0b0b0c','multi','eq',1],['墨蓝·白','#0f172a','#ffffff','eq',1],['石板·青','#1e293b','#5EEAD4','bob',1],
['深紫·品红','#1e1b4b','#F0ABFC','dot',1],['暗夜·彩','#111827','multi','bob',1],['炭黑·橙','#18181b','#FB923C','eq',1],['暗·薄荷','#0b0b0c','#34D399','dot',1],['白·蓝','#ffffff','#3b82f6','eq',0],
['白·青','#f5f5f7','#14b8a6','bob',0],['白·珊瑚','#ffffff','#fb7185','dot',0],['浅灰·紫','#f1f5f9','#8b5cf6','eq',0],['米白·琥珀','#faf7f0','#f59e0b','wave',0],['白·彩','#ffffff','multi','eq',0],
['雾蓝·深蓝','#eff6ff','#1d4ed8','bob',0],['薄荷白·绿','#ecfdf5','#059669','dot',0],['霓虹·青','#000000','#22d3ee','eq',1],['霓虹·品红','#000000','#ff2d95','bob',1],['霓虹·绿','#000000','#39ff14','eq',1],
['霓虹·橙','#000000','#ff7a18','dot',1],['霓虹·蓝','#050816','#4cc9f0','wave',1],['霓虹·紫','#000000','#b026ff','bob',1],['霓虹·黄','#000000','#eaff00','eq',1],['霓虹·彩','#000000','multi','eq',1],
['青底·白','#14b8a6','#ffffff','eq',1],['蓝底·白','#3b82f6','#ffffff','bob',1],['靛底·白','#6366f1','#ffffff','dot',1],['珊瑚底·白','#fb7185','#ffffff','eq',1],['品红底·白','#d946ef','#ffffff','bob',1],
['翠底·白','#10b981','#ffffff','wave',1],['琥珀底·黑','#f59e0b','#1f2937','eq',0],['天蓝底·白','#0ea5e9','#ffffff','dot',1],['渐变·暮','linear-gradient(135deg,#1e3a8a,#9333ea)','#ffffff','eq',1],['渐变·海','linear-gradient(135deg,#0ea5e9,#14b8a6)','#ffffff','bob',1],
['渐变·日落','linear-gradient(135deg,#f97316,#ec4899)','#ffffff','dot',1],['渐变·森林','linear-gradient(135deg,#065f46,#84cc16)','#ffffff','wave',1],['渐变·夜空','linear-gradient(135deg,#0f172a,#334155)','#7DB4FF','eq',1],['渐变·樱','linear-gradient(135deg,#fb7185,#f9a8d4)','#ffffff','bob',1],['渐变·极光','linear-gradient(135deg,#22d3ee,#a78bfa)','#ffffff','dot',1],
['渐变·熔岩','linear-gradient(135deg,#7f1d1d,#f97316)','#ffffff','eq',1],['粉彩·薰衣草','#ede9fe','#7c3aed','dot',0],['粉彩·薄荷','#d1fae5','#059669','bob',0],['粉彩·蜜桃','#ffe4e6','#e11d48','eq',0],['玻璃·暗','rgba(17,17,20,.6)','#ffffff','eq',1],['玻璃·亮','rgba(255,255,255,.7)','#3b82f6','bob',0]
];
var g=document.getElementById('g');
S.forEach(function(s,i){
 var cell=mk('div','cell');
 var p=mk('div','pill','background:'+s[1]+';'+(s[0].indexOf('玻璃')===0?'backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:.5px solid rgba(128,128,128,.25);':'border:.5px solid rgba(128,128,128,.18);'));
 p.appendChild(mk('span','dotb','background:'+(s[4]?'rgba(255,255,255,.92)':'rgba(0,0,0,.55)')));
 p.appendChild(center(s[3],s[2]));
 cell.appendChild(p);
 cell.appendChild(mk('div','lab',null,(i+1)+'. '+s[0]));
 g.appendChild(cell);
});
})();
</script>
</body></html>
