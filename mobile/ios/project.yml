name: WordTaker
options:
  bundleIdPrefix: com.wordtaker
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    # Set your real Team ID here (or in Xcode > Signing & Capabilities) to build
    # on a device. Leave empty for simulator builds without signing.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  WordTaker:
    type: application
    platform: iOS
    # Hand-written Info.plist and entitlements are referenced via build settings
    # below. We deliberately do NOT use XcodeGen's `info:`/`entitlements:` keys,
    # because those regenerate (overwrite) the files on every `xcodegen generate`.
    sources:
      - path: WordTaker/Sources
      - path: Shared
      - path: WordTaker/Resources/Info.plist
        buildPhase: none
      - path: WordTaker/Resources/WordTaker.entitlements
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordtaker.app
        INFOPLIST_FILE: WordTaker/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: WordTaker/Resources/WordTaker.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: WordTakerKeyboard
        embed: true

  WordTakerKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: WordTakerKeyboard
        excludes:
          - "Info.plist"
          - "WordTakerKeyboard.entitlements"
      - path: Shared
      - path: WordTakerKeyboard/Info.plist
        buildPhase: none
      - path: WordTakerKeyboard/WordTakerKeyboard.entitlements
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordtaker.app.keyboard
        INFOPLIST_FILE: WordTakerKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: WordTakerKeyboard/WordTakerKeyboard.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"

  WordTakerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WordTakerTests
    dependencies:
      - target: WordTaker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordtaker.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  WordTaker:
    build:
      targets:
        WordTaker: all
        WordTakerKeyboard: all
    test:
      targets:
        - WordTakerTests
    run:
      config: Debug
