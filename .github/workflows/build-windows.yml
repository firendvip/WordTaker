name: Build Windows

# 在 windows-latest runner 上产出真正的 Windows .exe（本地 Mac 无 Wine 无法产出）。
# 手动触发为主；推 tag 时也会跑，便于做发布构建。注意：--publish never，不向 GitHub 发布。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# 发布 Release 资产需要写仓库内容的权限。
permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 仓库只有 pnpm-lock.yaml（无 package-lock.json），故用 pnpm 而非 npm ci。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 嵌入式 Python 构建脚本要用 pip 装 torch/funasr 等，需要 Python 3.11。
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装 JS 依赖。--ignore-scripts 跳过 postinstall（Windows 上 pnpm.cjs 调用会失败），
      # 再单独用 @electron/rebuild 按 Electron ABI 重建原生模块（Windows 需要 MSVC 工具链，
      # windows-latest 自带）。
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx --yes @electron/rebuild -f -w better-sqlite3 -w uiohook-napi

      # 下载 Windows 版嵌入式 CPython（python-build-standalone 的
      # x86_64-pc-windows-msvc-shared install_only 包）并装好 torch/funasr 等依赖。
      # prepare-embedded-python.js 已按 process.platform === 'win32' 走 Windows 布局。
      - name: Prepare embedded Python (Windows)
        run: pnpm run prepare:python:embedded

      # 校验嵌入式 Python 与关键依赖可用（numpy/torch/librosa/funasr/onnxruntime/funasr_onnx）。
      # 不再 continue-on-error：依赖缺失必须让 job 失败暴露，否则出包后运行时识别会崩。
      - name: Verify embedded Python
        run: pnpm run test:python

      # 下载并准备 SenseVoice ONNX 模型到 models/sensevoice/（仓库 .gitignore 了 models/，
      # clone 不含模型，必须在打包前补齐，否则安装包缺 model_quant.onnx，识别只能回退/失败）。
      # 用刚装好 funasr_onnx/onnxruntime/modelscope 的嵌入式 Python 拉取 iic/SenseVoiceSmall。
      - name: Download SenseVoice ONNX model
        shell: pwsh
        run: |
          $py = "python\python.exe"
          if (-not (Test-Path $py)) { Write-Error "embedded python.exe not found at $py"; exit 1 }
          $env:PYTHONHOME = (Resolve-Path "python").Path
          $env:PYTHONPATH = (Resolve-Path "python\Lib\site-packages").Path
          $env:PYTHONIOENCODING = "utf-8"
          # PowerShell 无 bash heredoc，写临时 .py 再执行。
          $script = @'
          import os, sys, glob, shutil
          dst = os.path.join("models", "sensevoice")
          os.makedirs(dst, exist_ok=True)
          need = ["model_quant.onnx", "tokens.json", "config.yaml", "am.mvn"]
          # 1) 先用 modelscope 快照下载（iic/SenseVoiceSmall 已自带量化 onnx）。
          src = None
          try:
              from modelscope import snapshot_download
              src = snapshot_download("iic/SenseVoiceSmall")
              print("snapshot dir:", src)
              for n in need:
                  for f in glob.glob(os.path.join(src, n)):
                      shutil.copy2(f, dst)
                      print("copied", n)
          except Exception as e:
              print("snapshot_download failed:", e)
          # 2) 若快照里没有量化 onnx，则用 funasr_onnx 导出生成 model_quant.onnx。
          if not os.path.exists(os.path.join(dst, "model_quant.onnx")):
              print("model_quant.onnx missing, exporting via funasr_onnx ...")
              from funasr_onnx import SenseVoiceSmall
              m = SenseVoiceSmall("iic/SenseVoiceSmall", batch_size=1, quantize=True, device_id="-1")
              exp = getattr(m, "model_dir", None) or (src or "")
              for n in need:
                  for f in glob.glob(os.path.join(exp, n)):
                      shutil.copy2(f, dst)
                      print("copied(export)", n)
          # 3) 断言关键文件齐全。
          missing = [n for n in ["model_quant.onnx", "tokens.json"] if not os.path.exists(os.path.join(dst, n))]
          if missing:
              print("ERROR: missing model files:", missing)
              sys.exit(1)
          print("SenseVoice model ready:", os.listdir(dst))
          '@
          Set-Content -Path "ci_download_sensevoice.py" -Value $script -Encoding utf8
          & $py "ci_download_sensevoice.py"
          if ($LASTEXITCODE -ne 0) { Write-Error "model download failed"; exit 1 }

      - name: Build renderer (Vite)
        run: pnpm run build:renderer

      # 真正产出 .exe：nsis 安装器 + portable 便携版。--publish never 不发布到 GitHub
      # （改用下方 softprops/action-gh-release 发 Release，绕开 Actions 工件存储配额）。
      - name: Build Windows installer + portable
        run: pnpm exec electron-builder --win --publish never
        env:
          # 关闭代码签名自动发现（CI 无证书）。
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # 断言打包进 asar.unpacked 的原生模块/可执行文件确为 Windows PE 且机器类型为 x64(AMD64)。
      # 仅校验 "MZ" 头不够——Mach-O/arm64 都可能蒙混；这里读 PE COFF 头的
      # IMAGE_FILE_HEADER.Machine（位于 e_lfanew+4 处的 2 字节），断言等于 0x8664(x64)。
      # 覆盖 better_sqlite3.node、uiohook.node 以及嵌入式 python.exe，
      # 防止 mac/arm64 二进制混入 Windows 包导致 0xc0000017 之类的启动崩溃。
      - name: Assert native modules + python.exe are Windows x64 PE
        shell: pwsh
        run: |
          $unpacked = "dist\win-unpacked\resources\app.asar.unpacked"
          $resources = "dist\win-unpacked\resources"
          $root = if (Test-Path $unpacked) { $unpacked } else { $resources }

          function Assert-X64Pe([string]$file) {
            $fs = [System.IO.File]::OpenRead($file)
            try {
              $br = New-Object System.IO.BinaryReader($fs)
              # DOS 头：偏移 0 必须是 "MZ"
              $mz = $br.ReadBytes(2)
              if ($mz[0] -ne 0x4D -or $mz[1] -ne 0x5A) {
                Write-Error "FAIL: $file 不是 PE（缺少 MZ 头，疑似 Mach-O/损坏）"
                exit 1
              }
              # e_lfanew 位于偏移 0x3C，4 字节，指向 PE 签名
              $fs.Seek(0x3C, [System.IO.SeekOrigin]::Begin) | Out-Null
              $peOffset = $br.ReadUInt32()
              # PE 签名 "PE\0\0"
              $fs.Seek($peOffset, [System.IO.SeekOrigin]::Begin) | Out-Null
              $pe = $br.ReadBytes(4)
              if ($pe[0] -ne 0x50 -or $pe[1] -ne 0x45 -or $pe[2] -ne 0 -or $pe[3] -ne 0) {
                Write-Error "FAIL: $file 缺少 PE\0\0 签名（偏移 $peOffset）"
                exit 1
              }
              # 紧跟 PE 签名的是 IMAGE_FILE_HEADER，其首 2 字节是 Machine
              $machine = $br.ReadUInt16()
              $hex = "0x{0:X4}" -f $machine
              Write-Host "$file -> Machine=$hex"
              if ($machine -ne 0x8664) {
                Write-Error "FAIL: $file 机器类型为 $hex，非 x64(0x8664)。疑似 mac/arm64 二进制误入 Windows 包。"
                exit 1
              }
            } finally {
              $fs.Close()
            }
          }

          # 校验 better-sqlite3 与 uiohook-napi 两个原生模块。
          # 注意：uiohook-napi 的二进制名不是 "uiohook.node"——@electron/rebuild 产出
          # build/Release/uiohook_napi.node，预编译包则为 prebuilds/<plat>/uiohook-napi.node。
          # 两种命名都接受，避免漏检（旧的 MZ-only 检查曾因文件名不符而静默漏掉 uiohook）。
          $sqliteFiles = Get-ChildItem -Path $root -Recurse -Filter "better_sqlite3.node" -ErrorAction SilentlyContinue
          $sqliteCount = 0
          foreach ($f in $sqliteFiles) { Assert-X64Pe $f.FullName; $sqliteCount++ }
          if ($sqliteCount -lt 1) {
            Write-Error "FAIL: 未找到 better_sqlite3.node 进行校验。"
            exit 1
          }

          # uiohook-napi 会为所有平台都打包预编译 .node（prebuilds/darwin-*、prebuilds/linux-*、
          # bin/win32-x64-*、以及 @electron/rebuild 的 build/Release/uiohook_napi.node）。
          # 只校验“Windows 会实际加载”的 x64 二进制：路径含 win32-x64 或 build\Release。
          # darwin/linux 的 .node 是 Mach-O/ELF（非 PE），本就不该按 PE 校验——但它们随包分发属冗余，
          # 这里检测到就发 warning 提示（不致命，运行期 node-gyp-build 只加载 win32-x64 版本）。
          $allUiohook = Get-ChildItem -Path $root -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -eq "uiohook_napi.node" -or $_.Name -eq "uiohook-napi.node" }
          $uiohookWin = $allUiohook | Where-Object {
            $_.FullName -match "win32-x64" -or $_.FullName -match "build\\Release"
          }
          $uiohookForeign = $allUiohook | Where-Object {
            $_.FullName -match "darwin" -or $_.FullName -match "linux"
          }
          foreach ($f in $uiohookForeign) {
            Write-Host "WARN: 包内含非 Windows uiohook 预编译二进制（冗余，可后续从打包中排除）：$($f.FullName)"
          }
          $uiohookCount = 0
          foreach ($f in $uiohookWin) { Assert-X64Pe $f.FullName; $uiohookCount++ }
          if ($uiohookCount -lt 1) {
            Write-Error "FAIL: 未找到 Windows x64 的 uiohook 原生模块（win32-x64 / build\Release 下的 uiohook_napi.node / uiohook-napi.node）进行校验。"
            exit 1
          }
          $checked = $sqliteCount + $uiohookCount

          # 嵌入式 python.exe（打到 resources 下）也必须是 Windows x64 PE。
          $pyFiles = Get-ChildItem -Path $resources -Recurse -Filter "python.exe" -ErrorAction SilentlyContinue
          if ($pyFiles) {
            foreach ($f in $pyFiles) { Assert-X64Pe $f.FullName; $checked++ }
          } else {
            Write-Host "WARN: 未在 $resources 下找到 python.exe（跳过其 PE 校验）"
          }

          Write-Host "x64 PE 断言通过，共校验 $checked 个文件。"

      # 计算各安装包的 SHA256 写入 SHA256SUMS.txt，随 Release 一并发布，
      # 供用户校验下载完整性（损坏的下载是 0xc0000017 的头号嫌疑）。
      - name: Compute SHA256SUMS for installers
        shell: pwsh
        run: |
          $installers = Get-ChildItem -Path "dist" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          if (-not $installers) {
            Write-Error "FAIL: dist 下未找到任何 .exe 安装包，无法生成 SHA256SUMS。"
            exit 1
          }
          $lines = @()
          foreach ($f in $installers) {
            $h = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLower()
            $lines += "$h  $($f.Name)"
            Write-Host "$h  $($f.Name)"
          }
          Set-Content -Path "dist\SHA256SUMS.txt" -Value $lines -Encoding ascii
          Write-Host "已写入 dist\SHA256SUMS.txt"

      # 发布到 GitHub Release（Release 资产不计入 Actions 工件存储配额，
      # 这是此前 CI 因配额满而失败的根因修复）。tag 即触发本工作流的 tag。
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*-setup.exe
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
            dist/SHA256SUMS.txt

      # 备份性短保留工件（仅 workflow_dispatch 等无 tag 场景方便取包）；
      # retention-days 设到最小 1 天，尽量不占用存储配额。
      - name: Upload Windows artifacts (short retention)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: wordtaker-windows
          if-no-files-found: error
          retention-days: 1
          path: |
            dist/*-setup.exe
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
