name: Build Windows

# 在 windows-latest runner 上产出真正的 Windows .exe（本地 Mac 无 Wine 无法产出）。
# 手动触发为主；推 tag 时也会跑，便于做发布构建。注意：--publish never，不向 GitHub 发布。
#
# 矩阵：arch ∈ {x64, arm64}。
#   - x64：历史路径（embedded x86_64 CPython + torch/funasr + SenseVoice ONNX），行为不变。
#   - arm64：纯 SenseVoice ONNX 路径（aarch64 CPython + onnxruntime + funasr_onnx，NO torch），
#            修复 Windows-on-ARM 上 torch 缺 win-arm64 轮子导致的 0xc0000017 启动崩溃。
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# 发布 Release 资产需要写仓库内容的权限。
permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    timeout-minutes: 90

    strategy:
      # 一个 arch 失败不连累另一个（x64 必须保持可发布，即便 arm64 实验构建失败）。
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 仓库只有 pnpm-lock.yaml（无 package-lock.json），故用 pnpm 而非 npm ci。
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pnpm-store-

      # 嵌入式 Python 构建脚本要用 pip 装依赖，需要一个本机 Python 3.11 跑 pip。
      # 注意：runner 本身是 x64，这里的 host Python 仅用于驱动 pip --target 安装到嵌入式目录；
      # arm64 依赖通过 --only-binary=all 取 win_arm64 轮子（onnxruntime/numpy 均有），不需要本机为 arm64。
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装 JS 依赖。--ignore-scripts 跳过 postinstall（Windows 上 pnpm.cjs 调用会失败），
      # 再单独用 @electron/rebuild 按 Electron ABI + 目标架构重建原生模块。
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      # 按目标架构重建原生模块。
      #   - x64：默认架构，沿用历史命令。
      #   - arm64：@electron/rebuild --arch arm64 交叉编译 better-sqlite3；
      #     uiohook-napi 有 win32-arm64 预编译，node-gyp-build 运行期自动选用，无需源码重建。
      - name: Rebuild native modules for Electron
        run: npx --yes @electron/rebuild -f -w better-sqlite3 -w uiohook-napi --arch ${{ matrix.arch }}

      # 下载并准备目标架构的嵌入式 CPython 并装好依赖。
      #   - x64：x86_64-pc-windows-msvc-shared install_only + torch/funasr/onnx 全量依赖。
      #   - arm64：aarch64-pc-windows-msvc install_only（astral-sh，tag 20260623）+
      #     纯 ONNX 依赖（numpy + onnxruntime + funasr_onnx，NO torch）。
      - name: Prepare embedded Python
        run: node scripts/prepare-embedded-python.js --platform=win32 --arch=${{ matrix.arch }}

      # 校验嵌入式 Python。
      #   - x64：嵌入式解释器与 runner 同架构，可直接执行，跑完整 test:python
      #     （numpy/torch/librosa/funasr 等导入校验）。
      #   - arm64：嵌入式是 aarch64 解释器，无法在 x64 runner 上执行（exec format error），
      #     故只做"文件存在性 + site-packages 关键包目录存在"的静态校验（python.exe、
      #     onnxruntime、funasr_onnx、numpy 三个包目录）。真正的运行期导入由用户在 ARM 机上验证。
      - name: Verify embedded Python (x64)
        if: matrix.arch == 'x64'
        run: pnpm run test:python

      - name: Verify embedded Python (arm64 static)
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $py = "python\python.exe"
          if (-not (Test-Path $py)) { Write-Error "FAIL: 嵌入式 python.exe 不存在: $py"; exit 1 }
          Write-Host "OK: $py 存在"
          $site = "python\Lib\site-packages"
          if (-not (Test-Path $site)) { Write-Error "FAIL: site-packages 不存在: $site"; exit 1 }
          # 纯 numpy SenseVoice 引擎依赖：onnxruntime / numpy / soundfile 应已就位。
          # （不含 funasr_onnx —— 其依赖 kaldi-native-fbank/torch 无 win-arm64 轮子，已用自带 numpy 引擎替代。）
          # 注意：包可能是目录(numpy/、onnxruntime/)，也可能是单文件模块(soundfile.py)，
          # 故同时接受 <name>/ 目录、<name>.py 单文件、或 <name>*.dist-info 元数据三种形态。
          $need = @("onnxruntime", "numpy", "soundfile")
          foreach ($n in $need) {
            $asDir = Test-Path (Join-Path $site $n)
            $asFile = Test-Path (Join-Path $site "$n.py")
            $asDist = (Get-ChildItem -Path $site -Filter "$n*.dist-info" -Directory -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0
            if (-not ($asDir -or $asFile -or $asDist)) {
              Write-Error "FAIL: 缺少纯 ONNX 依赖: $n（既无目录/单文件模块/dist-info；torch/funasr_onnx 已按设计排除）"
              exit 1
            }
            Write-Host "OK: 依赖存在 $n (dir=$asDir file=$asFile dist=$asDist)"
          }
          # 确认 torch 未被误装进 arm64 包（应不存在）。
          if (Test-Path (Join-Path $site "torch")) {
            Write-Host "WARN: arm64 包内出现 torch 目录（不应存在，但不致命）"
          }
          Write-Host "arm64 嵌入式 Python 静态校验通过（运行期导入需在 ARM 机验证）。"

      # 下载并准备 SenseVoice ONNX 模型到 models/sensevoice/（仓库 .gitignore 了 models/）。
      # 用刚装好 funasr_onnx/onnxruntime 的嵌入式 Python 拉取/导出 iic/SenseVoiceSmall 的量化 onnx。
      # arm64 嵌入式 Python 是 aarch64 解释器，无法在 x64 runner 上原地执行——故 arm64 作业改用
      # runner 自带的 host Python（已装 onnxruntime/funasr_onnx/modelscope 见下）跑下载脚本，
      # 产物 model_quant.onnx/tokens.json 与架构无关（纯模型文件），可安全打进 arm64 包。
      # host runner 是 x64：在 host(x64) Python 上装与 x64 嵌入式构建「完全相同」的导出依赖集，
      # 用于把 iic/SenseVoiceSmall 导出/量化为 model_quant.onnx（产物与架构无关，可打进 arm64 包）。
      # 关键：torch 必须钉 2.0.1（与 x64 嵌入式一致）——新版 torch 的 onnx 导出器需要 onnxscript 等
      # 额外依赖，会引入无谓的依赖链；2.0.1 的导出路径自洽、已在 x64 作业验证可用。
      # 用 CPU 轮子(--index-url .../whl/cpu)。这些只装在 host，不进 arm64 包。
      - name: Install host tooling for model download (arm64)
        if: matrix.arch == 'arm64'
        run: |
          python -m pip install --upgrade pip
          python -m pip install "numpy<2" onnxruntime modelscope jieba kaldi-native-fbank
          python -m pip install torch==2.0.1 torchaudio==2.0.2 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install "funasr>=1.2.7" "funasr_onnx>=0.4.1"

      - name: Download SenseVoice ONNX model
        shell: pwsh
        run: |
          # x64 用刚构建好的嵌入式 python.exe；arm64 用 runner 的 host python（嵌入式是 aarch64 无法执行）。
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "arm64") {
            $py = "python"
          } else {
            $py = "python\python.exe"
            if (-not (Test-Path $py)) { Write-Error "embedded python.exe not found at $py"; exit 1 }
            $env:PYTHONHOME = (Resolve-Path "python").Path
            $env:PYTHONPATH = (Resolve-Path "python\Lib\site-packages").Path
          }
          $env:PYTHONIOENCODING = "utf-8"
          # PowerShell 无 bash heredoc，写临时 .py 再执行。
          $script = @'
          import os, sys, glob, shutil
          dst = os.path.join("models", "sensevoice")
          os.makedirs(dst, exist_ok=True)
          need = ["model_quant.onnx", "tokens.json", "config.yaml", "am.mvn"]
          # 1) 先用 modelscope 快照下载（iic/SenseVoiceSmall 已自带量化 onnx）。
          src = None
          try:
              from modelscope import snapshot_download
              src = snapshot_download("iic/SenseVoiceSmall")
              print("snapshot dir:", src)
              for n in need:
                  for f in glob.glob(os.path.join(src, n)):
                      shutil.copy2(f, dst)
                      print("copied", n)
          except Exception as e:
              print("snapshot_download failed:", e)
          # 2) 若快照里没有量化 onnx，则用 funasr_onnx 导出生成 model_quant.onnx。
          if not os.path.exists(os.path.join(dst, "model_quant.onnx")):
              print("model_quant.onnx missing, exporting via funasr_onnx ...")
              from funasr_onnx import SenseVoiceSmall
              m = SenseVoiceSmall("iic/SenseVoiceSmall", batch_size=1, quantize=True, device_id="-1")
              exp = getattr(m, "model_dir", None) or (src or "")
              for n in need:
                  for f in glob.glob(os.path.join(exp, n)):
                      shutil.copy2(f, dst)
                      print("copied(export)", n)
          # 3) 断言关键文件齐全。
          missing = [n for n in ["model_quant.onnx", "tokens.json"] if not os.path.exists(os.path.join(dst, n))]
          if missing:
              print("ERROR: missing model files:", missing)
              sys.exit(1)
          print("SenseVoice model ready:", os.listdir(dst))
          '@
          Set-Content -Path "ci_download_sensevoice.py" -Value $script -Encoding utf8
          & $py "ci_download_sensevoice.py"
          if ($LASTEXITCODE -ne 0) { Write-Error "model download failed"; exit 1 }

      - name: Build renderer (Vite)
        run: pnpm run build:renderer

      # 真正产出 .exe：nsis 安装器 + portable 便携版，按矩阵架构构建。--publish never 不发布到 GitHub。
      - name: Build Windows installer + portable
        run: pnpm exec electron-builder --win --${{ matrix.arch }} --publish never
        env:
          # 关闭代码签名自动发现（CI 无证书）。
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # 断言打包进 asar.unpacked 的原生模块/可执行文件确为 Windows PE 且机器类型匹配目标架构。
      #   x64   -> 0x8664(IMAGE_FILE_MACHINE_AMD64)
      #   arm64 -> 0xAA64(IMAGE_FILE_MACHINE_ARM64)
      # 防止错误架构二进制混入（mac/arm64 进 x64 包、或 x64 进 arm64 包）导致 0xc0000017 启动崩溃。
      - name: Assert native modules + python.exe PE machine type
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "arm64") {
            $expectMachine = 0xAA64
            $expectName = "arm64(0xAA64)"
            $winDirToken = "win32-arm64"
          } else {
            $expectMachine = 0x8664
            $expectName = "x64(0x8664)"
            $winDirToken = "win32-x64"
          }

          # 关键：必须按目标架构选对解包目录。electron-builder 把 x64 解包到
          # dist\win-unpacked，arm64 解包到 dist\win-arm64-unpacked。即便 arm64 作业里
          # 多 arch nsis 目标也会顺带产出 x64 的 win-unpacked，故这里严格只看本架构的目录，
          # 否则会误读到对方架构的 .node 而误判（曾在 arm64 作业读到 win-unpacked 的 x64 0x8664）。
          if ($arch -eq "arm64") {
            $unpackDir = "dist\win-arm64-unpacked"
          } else {
            $unpackDir = "dist\win-unpacked"
          }
          $root = Join-Path $unpackDir "resources\app.asar.unpacked"
          $resources = Join-Path $unpackDir "resources"
          if (-not (Test-Path $root)) {
            if (Test-Path $resources) { $root = $resources }
            else { Write-Error "FAIL: 未找到本架构解包目录: $unpackDir"; exit 1 }
          }
          Write-Host "目标架构: $arch；解包根目录: $root"

          function Assert-Pe([string]$file, [int]$expect, [string]$expectLabel) {
            $fs = [System.IO.File]::OpenRead($file)
            try {
              $br = New-Object System.IO.BinaryReader($fs)
              # DOS 头：偏移 0 必须是 "MZ"
              $mz = $br.ReadBytes(2)
              if ($mz[0] -ne 0x4D -or $mz[1] -ne 0x5A) {
                Write-Error "FAIL: $file 不是 PE（缺少 MZ 头，疑似 Mach-O/损坏）"
                exit 1
              }
              # e_lfanew 位于偏移 0x3C，4 字节，指向 PE 签名
              $fs.Seek(0x3C, [System.IO.SeekOrigin]::Begin) | Out-Null
              $peOffset = $br.ReadUInt32()
              $fs.Seek($peOffset, [System.IO.SeekOrigin]::Begin) | Out-Null
              $pe = $br.ReadBytes(4)
              if ($pe[0] -ne 0x50 -or $pe[1] -ne 0x45 -or $pe[2] -ne 0 -or $pe[3] -ne 0) {
                Write-Error "FAIL: $file 缺少 PE\0\0 签名（偏移 $peOffset）"
                exit 1
              }
              # 紧跟 PE 签名的是 IMAGE_FILE_HEADER，其首 2 字节是 Machine
              $machine = $br.ReadUInt16()
              $hex = "0x{0:X4}" -f $machine
              Write-Host "$file -> Machine=$hex"
              if ($machine -ne $expect) {
                Write-Error "FAIL: $file 机器类型为 $hex，非 $expectLabel。疑似错误架构二进制混入。"
                exit 1
              }
            } finally {
              $fs.Close()
            }
          }

          # 校验 better-sqlite3。
          $sqliteFiles = Get-ChildItem -Path $root -Recurse -Filter "better_sqlite3.node" -ErrorAction SilentlyContinue
          $sqliteCount = 0
          foreach ($f in $sqliteFiles) { Assert-Pe $f.FullName $expectMachine $expectName; $sqliteCount++ }
          if ($sqliteCount -lt 1) {
            Write-Error "FAIL: 未找到 better_sqlite3.node 进行校验。"
            exit 1
          }

          # 校验 uiohook-napi：只校验“目标架构 Windows 会实际加载”的二进制
          # （win32-<arch> 预编译，或 @electron/rebuild 产出的 build\Release）。
          $allUiohook = Get-ChildItem -Path $root -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -eq "uiohook_napi.node" -or $_.Name -eq "uiohook-napi.node" }
          $uiohookWin = $allUiohook | Where-Object {
            $_.FullName.Contains($winDirToken) -or $_.FullName.Contains("build\Release")
          }
          $uiohookForeign = $allUiohook | Where-Object {
            $_.FullName.Contains("darwin") -or $_.FullName.Contains("linux")
          }
          foreach ($f in $uiohookForeign) {
            Write-Host "WARN: 包内含非 Windows uiohook 预编译二进制（冗余）：$($f.FullName)"
          }
          $uiohookCount = 0
          foreach ($f in $uiohookWin) { Assert-Pe $f.FullName $expectMachine $expectName; $uiohookCount++ }
          if ($uiohookCount -lt 1) {
            Write-Error "FAIL: 未找到目标架构（$winDirToken / build\Release）的 uiohook 原生模块进行校验。"
            exit 1
          }
          $checked = $sqliteCount + $uiohookCount

          # 嵌入式 python.exe（打到 resources 下）也必须是目标架构 Windows PE。
          if ($resources -and (Test-Path $resources)) {
            $pyFiles = Get-ChildItem -Path $resources -Recurse -Filter "python.exe" -ErrorAction SilentlyContinue
            if ($pyFiles) {
              foreach ($f in $pyFiles) { Assert-Pe $f.FullName $expectMachine $expectName; $checked++ }
            } else {
              Write-Host "WARN: 未在 $resources 下找到 python.exe（跳过其 PE 校验）"
            }
          }

          Write-Host "$expectName PE 断言通过，共校验 $checked 个文件。"

      # 计算各安装包的 SHA256 写入 SHA256SUMS.txt，随 Release 一并发布。
      # 矩阵每个 arch 生成各自的 SHA256SUMS（按 arch 命名避免覆盖），上传后由 Release 汇总。
      - name: Compute SHA256SUMS for installers
        shell: pwsh
        run: |
          $installers = Get-ChildItem -Path "dist" -Filter "*.exe" -File -ErrorAction SilentlyContinue
          if (-not $installers) {
            Write-Error "FAIL: dist 下未找到任何 .exe 安装包，无法生成 SHA256SUMS。"
            exit 1
          }
          $lines = @()
          foreach ($f in $installers) {
            $h = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLower()
            $lines += "$h  $($f.Name)"
            Write-Host "$h  $($f.Name)"
          }
          Set-Content -Path "dist\SHA256SUMS-${{ matrix.arch }}.txt" -Value $lines -Encoding ascii
          Write-Host "已写入 dist\SHA256SUMS-${{ matrix.arch }}.txt"

      # 发布到 GitHub Release（Release 资产不计入 Actions 工件存储配额）。
      # 两个 arch 作业都向同一 tag 的 Release 追加各自产物；artifactName 含 ${arch} 故文件名不冲突。
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*-setup.exe
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
            dist/SHA256SUMS-${{ matrix.arch }}.txt

      # 备份性短保留工件（仅 workflow_dispatch 等无 tag 场景方便取包）。
      - name: Upload Windows artifacts (short retention)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: wordtaker-windows-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1
          path: |
            dist/*-setup.exe
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml
            dist/SHA256SUMS-${{ matrix.arch }}.txt
